function openZoom(src,alt){
  document.getElementById('zoom_img').src=src;
  document.getElementById('zoom_img').alt=alt||'';
  document.getElementById('zoom_overlay').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeZoom(){
  document.getElementById('zoom_overlay').classList.remove('active');
  document.body.style.overflow='';
  document.getElementById('zoom_img').src='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});
</script>

function delivHistTpl(type,itemId){const h=D.deliveries.filter(d=>d.type===type&&d.itemId===itemId);if(!h.length)return"";return`<div class="card" style="margin-top:12px"><div class="card-hdr"><div class="card-title">📋 Histórico (${h.length})</div></div>${[...h].reverse().slice(0,8).map(d=>`<div class="row"><div><div class="row-main">${d.client||"(sem nome)"}</div><div class="row-sub">${d.resp} · ${d.date} · Dia ${d.day}</div></div></div>`).join("")}</div>`;}
function repBtn(label,fn){return`<button class="report-btn" onclick="${fn}">📊 ${label}</button>`;}
function generateReport(title,rows,headers){const csv=[headers.join(","),...rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","))].join("\n");const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=title+"_"+new Date().toLocaleDateString("pt-BR").replace(/\//g,"-")+".csv";a.click();URL.revokeObjectURL(url);toast("Relatório exportado!");}

/* ═══════════════ ADMIN LOGIN ═══════════════ */
function rAdminLogin(){app.innerHTML=`<div class="loginwrap"><div class="logincard"><div style="text-align:center;margin-bottom:24px"><svg width="130" height="40" viewBox="0 0 200 60"><text x="0" y="42" font-family="Impact,sans-serif" font-size="44" fill="#fbb909" font-style="italic" letter-spacing="-2">AHEAD</text><polygon points="148,28 178,44 163,44" fill="#fbb909"/></svg><div style="font-size:16px;font-weight:700;margin-top:10px;text-transform:uppercase;letter-spacing:1px">Acesso ADM</div></div>${S.admerr?`<div class="err">${S.admerr}</div>`:""}<label style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Senha</label><input class="f" type="password" id="admpw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAdmLogin()"/><button class="btn" onclick="doAdmLogin()">→ Entrar como Admin</button><button class="btn-ghost" style="width:100%;margin-top:8px" onclick="nav('home')">← Voltar</button></div></div>`;setTimeout(()=>document.getElementById("admpw")?.focus(),50);}
function doAdmLogin(){const pw=document.getElementById("admpw")?.value||"";if(pw===PASS_ADM){S.adm=true;S.admerr="";nav("home");}else{S.admerr="Senha incorreta.";render();}}

/* ═══════════════ SCHEDULE ═══════════════ */
function rSchedule(){
  const done=D.schedule.filter(s=>s.done).length,tot=D.schedule.length,pct=tot?Math.round(done/tot*100):0;
  app.innerHTML=`<div class="screen">${topbar("📅","Cronograma","Horários do evento")}<div class="body"><div class="card" style="background:var(--bg3);padding:14px;margin-bottom:12px"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Progresso do dia</div><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><span style="font-size:22px;font-weight:700;color:var(--y)">${done} feitos</span><span style="font-size:12px;color:var(--t3)">de ${tot}</span></div><div class="prog"><div class="prog-fill" style="width:${pct}%"></div></div></div><div class="card"><div class="card-hdr"><div class="card-title">📅 Grade Horária</div>${S.adm?`<button class="btn-ghost" onclick="S.editId='new_sched';S.editType='sched';render()">+ Adicionar</button>`:""}</div>${D.schedule.map(s=>{if(S.adm&&S.editId===s.id&&S.editType==="sched")return`<div class="epanel"><div class="erow"><input class="f f-sm" id="et_${s.id}" value="${s.t}" placeholder="HH:MM" style="max-width:80px"/><input class="f f-sm" id="ed_${s.id}" value="${s.d}"/></div><div class="eactions"><button class="btn-save" onclick="saveSchedEdit('${s.id}')">✓ Salvar</button><button class="btn-cancel" onclick="S.editId=null;render()">Cancelar</button><button class="btn-del" onclick="delSchedItem('${s.id}')">🗑</button></div></div>`;return`<div class="sched-item"><span class="sched-time">${s.t}</span><span class="sched-text" style="${s.done?"text-decoration:line-through;opacity:.45":""}">${s.d}</span>${S.adm?`<button class="btn-icon" onclick="S.editId='${s.id}';S.editType='sched';render()">✏️</button>`:""}<div class="check${s.done?" on":""}" onclick="toggleSchedDone('${s.id}')">${s.done?`<span style="color:#1a1a1a;font-size:11px;font-weight:700">✓</span>`:""}</div></div>`;}).join("")}${S.adm&&S.editId==="new_sched"?`<div class="epanel"><div class="epanel-title">Novo item</div><div class="erow"><input class="f f-sm" id="new_sched_t" placeholder="HH:MM" value="00:00" style="max-width:80px"/><input class="f f-sm" id="new_sched_d" placeholder="Descrição"/></div><div class="eactions"><button class="btn-save" onclick="saveSchedNew()">✓ Adicionar</button><button class="btn-cancel" onclick="S.editId=null;render()">Cancelar</button></div></div>`:""}</div></div></div>`;
}
function toggleSchedDone(id){D.schedule=D.schedule.map(s=>s.id===id?{...s,done:!s.done}:s);saveKey("schedule");render();}
function saveSchedEdit(id){const t=document.getElementById("et_"+id)?.value||"",d=document.getElementById("ed_"+id)?.value||"";if(!d)return;D.schedule=D.schedule.map(s=>s.id===id?{...s,t,d}:s);S.editId=null;saveKey("schedule");toast("Cronograma atualizado");render();}
function saveSchedNew(){const t=document.getElementById("new_sched_t")?.value||"",d=document.getElementById("new_sched_d")?.value||"";if(!d)return;D.schedule.push({id:uid(),t,d,done:false});S.editId=null;saveKey("schedule");toast("Item adicionado");render();}
function delSchedItem(id){D.schedule=D.schedule.filter(s=>s.id!==id);S.editId=null;saveKey("schedule");render();}

/* ═══════════════ CHECKLIST ═══════════════ */
function rChecklist(){
  const secs=Object.keys(DEF_CL_SECS);
  const isAdm=S.adm;
  const dayData=D.checklist[S.clDay]||{};
  const secData=dayData[S.clSec]||{};
  const items=Object.keys(secData);
  app.innerHTML=`<div class="screen">${topbar("⚠️","Reporte um Problema","Verificação do stand")}<div class="body"><div class="daytabs">${["1","2","3"].map(d=>`<div class="daytab${S.clDay===d?" on":""}" onclick="S.clDay='${d}';render()">Dia ${d} · ${23+Number(d)}/04</div>`).join("")}</div><div class="stabs">${secs.map(s=>`<div class="stab${S.clSec===s?" on":""}" onclick="S.clSec='${s}';S.editId=null;render()">${s}</div>`).join("")}</div>${isAdm?`<div class="card" style="margin-bottom:12px"><div class="card-hdr"><div class="card-title">📱 WhatsApp Reporte</div></div><div style="font-size:11px;color:var(--t3);margin-bottom:6px">Número que receberá os reportes de problemas:</div><div style="display:flex;gap:8px"><input class="f" id="wa_config_num" placeholder="Ex: 5511999999999" value="${waLoadNum()}" style="margin-bottom:0;flex:1"/><button class="btn-save" onclick="waSaveNum()">Salvar</button></div></div>`:""}<div class="card"><div class="card-hdr"><div class="card-title">✅ ${S.clSec}</div><div style="display:flex;gap:6px">${isAdm?`<button class="btn-ghost" onclick="S.editId='new_cl';render()">+ Item</button>`:""}${repBtn("Exportar","exportCLReport()")}</div></div>${items.map(item=>{const v=secData[item]||{status:null,wa:"",desc:""};if(isAdm&&S.editId===item&&S.editType==="cl")return`<div class="epanel"><input class="f f-sm" id="cl_name" value="${item}" style="margin-bottom:8px"/><input class="f f-sm" id="cl_desc" placeholder="Descrição/instrução (opcional)" value="${v.desc||""}" style="margin-bottom:8px"/><input class="f f-sm" id="cl_wa" placeholder="WhatsApp (ex: 5511999999999)" value="${v.wa||""}" style="margin-bottom:8px"/><div class="eactions"><button class="btn-save" onclick="saveCLEdit('${item.replace(/'/g,"\\'")}')">✓ Salvar</button><button class="btn-cancel" onclick="S.editId=null;render()">Cancelar</button><button class="btn-del" onclick="delCLItem('${item.replace(/'/g,"\\'")}')">🗑</button></div></div>`;return`<div class="cl-item"><div style="display:flex;align-items:center;gap:8px;margin-bottom:${v.desc?"4px":"8px"}"><div class="cl-item-label" style="flex:1;margin-bottom:0">${item}</div><span class="badge ${v.status===true?"badge-ok":v.status===false?"badge-prob":"badge-pend"}">${v.status===true?"OK":v.status===false?"PROB":"PEND"}</span>${isAdm?`<button class="btn-icon" onclick="S.editId='${item.replace(/'/g,"\\'")}';S.editType='cl';render()">✏️</button>`:""}</div>${v.desc?`<div class="cl-desc">${v.desc}</div>`:""}<div class="cl-btns"><button class="cl-btn cl-ok${v.status===true?" on":""}" onclick="setCL('${item.replace(/'/g,"\\'")}','status',true)">✓ OK</button><button class="cl-btn cl-prob${v.status===false?" on":""}" onclick="waToggleMotivo('${item.replace(/'/g,"\\'")}')">\u26a0 Problema</button></div><div id="wa_box_${btoa(item).replace(/[^a-z0-9]/gi,'')}" style="display:${v.status===false?'block':'none'};margin-top:8px"><textarea id="wa_motivo_${btoa(item).replace(/[^a-z0-9]/gi,'')}" class="f" placeholder="Descreva o problema..." style="height:70px;margin-bottom:8px;resize:vertical"></textarea><button class="wa-btn" onclick="waSendProblema('${item.replace(/'/g,"\\'")}')">📲 Enviar via WhatsApp</button></div>${v.wa?`<button class="wa-btn" onclick="openWA('${v.wa}','${item.replace(/'/g,"\\'")}')">💬 WhatsApp responsável</button>`:""}</div>`;}).join("")}${isAdm&&S.editId==="new_cl"?`<div class="epanel"><div class="epanel-title">Novo item</div><input class="f f-sm" id="new_cl_name" placeholder="Nome do item" style="margin-bottom:8px"/><input class="f f-sm" id="new_cl_desc" placeholder="Descrição (opcional)" style="margin-bottom:8px"/><input class="f f-sm" id="new_cl_wa" placeholder="WhatsApp (opcional)" style="margin-bottom:8px"/><div class="eactions"><button class="btn-save" onclick="saveCLNew()">✓ Adicionar</button><button class="btn-cancel" onclick="S.editId=null;render()">Cancelar</button></div></div>`:""}</div></div></div>`;

/* ═══════════════ CLIENTES ═══════════════ */
function rClients(){
  if(!S.adm){nav("home");return;}
  const f=S.clientForm;
  app.innerHTML=`<div class="screen">${topbar("👥","Clientes","Leads e cadastros")}<div class="body">${S.ok?`<div class="ok">${S.ok}</div>`:""}<div class="card"><div class="card-hdr"><div class="card-title">➕ Novo cadastro</div></div><input class="f" id="c_name" placeholder="Nome completo *" value="${f.name}" oninput="S.clientForm.name=this.value"/><input class="f" id="c_cpf" placeholder="CPF / CNPJ" value="${f.cpf}" oninput="S.clientForm.cpf=this.value"/><input class="f" id="c_tel" placeholder="Telefone *" value="${f.tel}" oninput="S.clientForm.tel=this.value"/><input class="f" id="c_email" placeholder="E-mail" value="${f.email}" oninput="S.clientForm.email=this.value"/><select class="f" onchange="S.clientForm.tipoCliente=this.value"><option value="academia" ${f.tipoCliente==="academia"?"selected":""}>Academia</option><option value="revenda" ${f.tipoCliente==="revenda"?"selected":""}>Revenda</option><option value="condominio" ${f.tipoCliente==="condominio"?"selected":""}>Condomínio</option><option value="studio" ${f.tipoCliente==="studio"?"selected":""}>Studio</option><option value="home" ${f.tipoCliente==="home"?"selected":""}>Home</option></select><select class="f" onchange="S.clientForm.tipo=this.value"><option value="lead" ${f.tipo==="lead"?"selected":""}>Lead — Interessado</option><option value="cliente" ${f.tipo==="cliente"?"selected":""}>Cliente — Comprou</option><option value="vip" ${f.tipo==="vip"?"selected":""}>VIP / Influenciador</option></select><input class="f" id="c_resp" placeholder="Responsável pelo atendimento *" value="${f.resp}" oninput="S.clientForm.resp=this.value"/><button class="btn" onclick="saveClient()">→ Cadastrar</button></div><div class="card">${repBtn("Exportar clientes","exportClients()")}<div class="card-hdr"><div class="card-title">👥 Cadastros (${D.clients.length})</div></div>${D.clients.length===0?`<div class="empty">Nenhum cadastro ainda.</div>`:""} ${[...D.clients].reverse().map(c=>`<div class="row"><div style="flex:1"><div class="row-main">${c.name}</div><div class="row-sub">${c.tel}${c.email?" · "+c.email:""} · ${c.resp}</div><div class="row-sub" style="margin-top:2px">${c.tipoCliente?`<span style="background:var(--bg3);color:var(--t2);padding:1px 6px;border-radius:4px;font-size:10px">${c.tipoCliente}</span>`:""} <span class="badge badge-${c.tipo}" style="margin-left:4px">${c.tipo.toUpperCase()}</span></div></div><button class="btn-del" onclick="delClient('${c.id}')">Del</button></div>`).join("")}</div></div></div>`;
}
function saveClient(){const f=S.clientForm;if(!f.name||!f.tel||!f.resp){toast("Preencha nome, telefone e responsável.");return;}D.clients.push({id:uid(),...f,date:now()});S.ok="✓ Cliente cadastrado!";S.clientForm={name:"",cpf:"",tel:"",email:"",tipo:"lead",tipoCliente:"academia",resp:f.resp};saveKey("clients");render();setTimeout(()=>{S.ok="";},2500);}
function delClient(id){if(!confirm("Excluir cliente?"))return;D.clients=D.clients.filter(x=>x.id!==id);saveKey("clients");render();}
function exportClients(){const rows=D.clients.map(c=>[c.id,c.name,c.cpf||"",c.tel,c.email||"",c.tipoCliente||"",c.tipo,c.resp,c.date]);generateReport("Clientes",rows,["ID","Nome","CPF/CNPJ","Telefone","Email","Tipo Cliente","Status","Responsável","Data"]);}

/* ═══════════════ PROPOSTAS ═══════════════ */
function rPropostas(){
  const f=S.propForm;
  const isAdm=S.adm;
  app.innerHTML=`<div class="screen">${topbar("💼","Propostas","Registro de vendas")}<div class="body"><div class="card"><div class="card-hdr"><div class="card-title">💼 Nova Proposta</div></div><input class="f" id="p_cliente" placeholder="Nome do cliente *" value="${f.cliente}" oninput="S.propForm.cliente=this.value"/><input class="f" id="p_vendedor" placeholder="Nome do vendedor *" value="${f.vendedor}" oninput="S.propForm.vendedor=this.value"/><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input class="f" id="p_entrada" type="number" placeholder="Valor entrada R$" value="${f.entrada}" oninput="S.propForm.entrada=this.value"/><input class="f" id="p_total" type="number" placeholder="Valor total R$" value="${f.total}" oninput="S.propForm.total=this.value"/></div><button class="btn" onclick="saveProposta()">→ Registrar proposta</button>${S.ok?`<div class="ok" style="margin-top:10px">${S.ok}</div>`:""}</div><div class="card"><div class="card-hdr"><div class="card-title">📋 Propostas Registradas</div>${repBtn("Exportar","exportPropostas()")}</div><div class="search-wrap"><div class="search-icon">🔍</div><input class="f" style="padding-left:36px;margin-bottom:0" placeholder="Buscar por ID da venda..." id="prop_search" value="${S.propSearch}" oninput="S.propSearch=this.value;render()"/></div>${renderPropostasTable()}</div></div></div>`;
}
function renderPropostasTable(){const q=S.propSearch.toLowerCase();const list=[...D.propostas].reverse().filter(p=>!q||p.id.toLowerCase().includes(q)||p.cliente.toLowerCase().includes(q));if(!list.length)return`<div class="empty">Nenhuma proposta encontrada.</div>`;return`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>ID</th><th>Cliente</th><th>Vendedor</th><th>Total</th><th>Entrada</th><th>Dia</th>${S.adm?"<th>Del</th>":""}</tr></thead><tbody>${list.map(p=>`<tr><td><span class="proprow-id">${p.id}</span></td><td>${p.cliente}</td><td>${p.vendedor}</td><td style="color:var(--y);font-weight:700">${fmt(p.total)}</td><td style="color:var(--g)">${fmt(p.entrada)}</td><td>Dia ${p.day}</td>${S.adm?`<td><button class="btn-del" onclick="delProposta('${p.id}')">Del</button></td>`:""}</tr>`).join("")}</tbody></table></div>`;}
function saveProposta(){const f=S.propForm;if(!f.cliente||!f.vendedor||!f.entrada||!f.total){toast("Preencha todos os campos.");return;}D.propostas.push({id:"VD-"+Date.now().toString(36).toUpperCase(),cliente:f.cliente,vendedor:f.vendedor,entrada:parseFloat(f.entrada)||0,total:parseFloat(f.total)||0,date:now(),day:curDay()});S.ok="✓ Proposta registrada!";S.propForm={cliente:"",vendedor:"",entrada:"",total:""};saveKey("propostas");render();setTimeout(()=>{S.ok="";},2500);}
function delProposta(id){if(!confirm("Excluir proposta?"))return;D.propostas=D.propostas.filter(p=>p.id!==id);saveKey("propostas");render();}
function exportPropostas(){const rows=D.propostas.map(p=>[p.id,p.cliente,p.vendedor,p.total,p.entrada,p.date,"Dia "+p.day]);generateReport("Propostas_Vendas",rows,["ID","Cliente","Vendedor","Valor Total","Valor Entrada","Data","Dia"]);}

/* ═══════════════ REPORTS ═══════════════ */
function rReports(){
  if(!S.adm){nav("home");return;}
  const repTabs=[{id:"geral",l:"Geral"},{id:"brindes",l:"Brindes"},{id:"uniformes",l:"Uniformes"},{id:"lanches",l:"Lanches"},{id:"propostas",l:"Propostas"}];
  const filterDelivs=(type)=>S.repDay==="all"?D.deliveries.filter(d=>d.type===type):D.deliveries.filter(d=>d.type===type&&d.day===S.repDay);
  let body="";
  if(S.repTab==="geral"){
    const bEnt=filterDelivs("brinde").length,uEnt=filterDelivs("uniforme").length,lEnt=filterDelivs("lanche").length;
    const probs=Object.values(D.checklist).reduce((t,day)=>t+Object.values(day).reduce((t2,sec)=>t2+Object.values(sec).filter(v=>v&&v.status===false).length,0),0);
    const totProp=D.propostas.reduce((a,p)=>a+p.total,0),totEnt=D.propostas.reduce((a,p)=>a+p.entrada,0);
    body=`<div class="statgrid"><div class="statcard"><div style="font-size:18px;margin-bottom:4px">🎁</div><div class="stat-val">${bEnt}</div><div class="stat-lbl">Brindes Entregues</div></div><div class="statcard"><div style="font-size:18px;margin-bottom:4px">👕</div><div class="stat-val">${uEnt}</div><div class="stat-lbl">Uniformes Entregues</div></div><div class="statcard"><div style="font-size:18px;margin-bottom:4px">🥪</div><div class="stat-val">${lEnt}</div><div class="stat-lbl">Lanches Retirados</div></div><div class="statcard"><div style="font-size:18px;margin-bottom:4px">👥</div><div class="stat-val">${D.clients.length}</div><div class="stat-lbl">Clientes</div></div><div class="statcard"><div style="font-size:18px;margin-bottom:4px">💼</div><div class="stat-val">${D.propostas.length}</div><div class="stat-lbl">Propostas</div></div><div class="statcard"><div style="font-size:18px;margin-bottom:4px">⚠️</div><div class="stat-val" style="color:${probs>0?"var(--r)":"var(--g)"}">${probs}</div><div class="stat-lbl">Problemas</div></div></div><div class="card"><div style="font-size:11px;font-weight:700;color:var(--y);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">💰 Vendas</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Total em vendas</div><div style="font-size:18px;font-weight:700;color:var(--y)">${fmt(totProp)}</div></div><div style="background:var(--bg3);border-radius:8px;padding:12px;text-align:center"><div style="font-size:11px;color:var(--t3);margin-bottom:4px">Total em entradas</div><div style="font-size:18px;font-weight:700;color:var(--g)">${fmt(totEnt)}</div></div></div></div>`;
  }else if(S.repTab==="propostas"){
    const propsDay=S.repDay==="all"?D.propostas:D.propostas.filter(p=>p.day===S.repDay);
    const totVendas=propsDay.reduce((a,p)=>a+p.total,0),totEntradas=propsDay.reduce((a,p)=>a+p.entrada,0);
    const vendedores={};propsDay.forEach(p=>{if(!vendedores[p.vendedor])vendedores[p.vendedor]={count:0,total:0,entrada:0};vendedores[p.vendedor].count++;vendedores[p.vendedor].total+=p.total;vendedores[p.vendedor].entrada+=p.entrada;});
    body=`<div class="statgrid"><div class="statcard"><div style="font-size:18px;margin-bottom:4px">💰</div><div class="stat-val" style="color:var(--y)">${fmt(totVendas)}</div><div class="stat-lbl">Total em Vendas</div></div><div class="statcard"><div style="font-size:18px;margin-bottom:4px">💵</div><div class="stat-val" style="color:var(--g)">${fmt(totEntradas)}</div><div class="stat-lbl">Total em Entradas</div></div></div>${repBtn("Exportar propostas","exportPropostas()")}<div class="card"><div class="card-hdr"><div class="card-title">👤 Acumulado por Vendedor</div></div>${Object.keys(vendedores).length===0?`<div class="empty">Sem dados.</div>`:Object.entries(vendedores).sort((a,b)=>b[1].total-a[1].total).map(([nome,v])=>`<div class="row"><div style="flex:1"><div class="row-main">${nome}</div><div class="row-sub">${v.count} proposta${v.count!==1?"s":""}</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:var(--y)">${fmt(v.total)}</div><div style="font-size:11px;color:var(--g)">Entrada: ${fmt(v.entrada)}</div></div></div>`).join("")}</div><div class="card"><div class="card-hdr"><div class="card-title">📋 Histórico de Propostas</div></div><div class="search-wrap"><div class="search-icon">🔍</div><input class="f" style="padding-left:36px;margin-bottom:0" placeholder="Buscar por ID..." id="rep_psearch" value="${S.propSearch}" oninput="S.propSearch=this.value;render()"/></div>${renderPropostasTable()}</div>`;
  }else{
    const type=S.repTab;const items=type==="brindes"?D.brindes:type==="uniformes"?D.uniformes.map(u=>({...u,id:u.size,icon:"👕",name:"Camiseta "+u.size})):D.lanches;const delivs=filterDelivs(type==="uniformes"?"uniforme":type.slice(0,-1));
    body=`${repBtn("Exportar","exportReport_"+type+"()")}<div class="card"><div class="card-hdr"><div class="card-title">📦 Estoque</div></div>${items.map(i=>{const pct=i.tot>0?Math.round(i.qty/i.tot*100):0;const c=pct===0?"var(--r)":pct<25?"#f59e0b":"var(--g)";return`<div class="stkrow"><span class="stkname">${i.icon||""} ${i.name}</span><div class="stkbar"><div class="stkfill" style="width:${pct}%;background:${c}"></div></div><span class="stknum" style="color:${c}">${i.qty}/${i.tot}</span></div>`;}).join("")}</div><div class="card"><div class="card-hdr"><div class="card-title">📋 Registros (${delivs.length})</div></div>${delivs.length===0?`<div class="empty">Sem registros.</div>`:delivs.map(d=>`<div class="row"><div style="flex:1"><div class="row-main">${d.itemName}</div><div class="row-sub">${d.client||"—"} · ${d.resp} · ${d.date} · Dia ${d.day}</div></div><button class="btn-del" onclick="delDelivery('${d.id}')">Del</button></div>`).join("")}</div>`;
  }
  app.innerHTML=`<div class="screen">${topbar("📊","Relatórios","Dashboard do evento")}<div class="body"><div class="daytabs">${[{id:"all",l:"TODOS"},{id:"1",l:"DIA 1"},{id:"2",l:"DIA 2"},{id:"3",l:"DIA 3"}].map(d=>`<button class="daytab${S.repDay===d.id?" on":""}" onclick="S.repDay='${d.id}';render()">${d.l}</button>`).join("")}</div><div class="stabs">${repTabs.map(t=>`<div class="stab${S.repTab===t.id?" on":""}" onclick="S.repTab='${t.id}';S.editId=null;render()">${t.l}</div>`).join("")}</div>${body}</div></div>`;
}

function exportReport_uniformes(){exportUniReport();}
